spring.application.name=TravelApp

server.port=${PORT:8080}

# ==========================================
# PRODUCTION DATABASE CONFIGURATION (RAILWAY)
# ==========================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.cache=false

# ==========================================
# APP SECURITY DEFAULT ACCOUNTS
# ==========================================
travelapp.default-admin.email=admin@example.com
travelapp.default-admin.password=admin123

# ==========================================
# EMAIL SERVICE SETTINGS (BREVO SMTP VIA RAILWAY VARIABLES)
# ==========================================
# 🎯 මේවා Railway Variables වලින් dynamic විදිහට ගන්නවා. එතකොට කෝඩ් එක ආරක්ෂිතයි.
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# 🔐 SSL (Port 465) ආරක්ෂාව සඳහා අත්‍යවශ්‍ය සෙටින්ග්ස් ටික:
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.socketFactory.port=${SPRING_MAIL_PORT}
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
