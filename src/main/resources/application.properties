spring.application.name=TravelApp

server.port=${PORT:8080}

# ==========================================
# PRODUCTION DATABASE CONFIGURATION (RAILWAY)
# ==========================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.cache=false

# ==========================================
# APP SECURITY DEFAULT ACCOUNTS
# ==========================================
travelapp.default-admin.email=admin@example.com
travelapp.default-admin.password=admin123

